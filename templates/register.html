{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>التسجيل | Inscription</h1>
        
        {% if error %}
        <div style="background-color: #fee; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; color: #c33;">
            ⚠️ {{ error }}
        </div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label>Nom d'utilisateur | سمية ديالك</label>
                <input type="text" name="nom" placeholder="Votre nom" required>
            </div>
            <div class="form-group">
                <label>Email (optionnel)</label>
                <input type="email" name="email" placeholder="votre.email@example.com">
            </div>
            <div class="form-group">
                <label>Rôle | الدور</label>
                <select name="role" id="role-select">
                    <option value="client">Client زبون</option>
                    <option value="chauffeur">Chauffeur سائق</option>
                    <option value="admin">Admin مسؤول</option>
                </select>
            </div>
            <div class="form-group" id="code-group" style="display: none;">
                <label>Code Administrateur (obligatoire pour admin)</label>
                <input type="password" name="code" id="code-input" placeholder="••••••">
                <small style="color: #666;">Veuillez entrer le code administrateur / أدخل رمز المسؤول</small>
            </div>
            <button type="submit" class="btn btn-primary">تسجيل | S'inscrire</button>
        </form>
        <p class="auth-link">Déjà inscrit ? <a href="/login">Se connecter</a></p>
    </div>
</div>

<script>
document.getElementById('role-select').addEventListener('change', function(e) {
    const codeGroup = document.getElementById('code-group');
    const codeInput = document.getElementById('code-input');
    if (e.target.value === 'admin') {
        codeGroup.style.display = 'block';
        codeInput.required = true;
    } else {
        codeGroup.style.display = 'none';
        codeInput.required = false;
    }
});
</script>
{% endblock %}
